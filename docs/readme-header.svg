<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="FlaxeoUI">
  <defs>
    <clipPath id="rounded">
      <rect width="1200" height="360" rx="28" />
    </clipPath>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#172033" flood-opacity="0.28" />
    </filter>
  </defs>
  <g clip-path="url(#rounded)">
    <image href="../src/renderer/src/assets/sky-wallpaper.jpg" width="1200" height="360" preserveAspectRatio="xMidYMid slice" />
    <rect width="1200" height="360" fill="rgba(18, 36, 68, 0.14)" />
    <text
      x="50%"
      y="54%"
      text-anchor="middle"
      dominant-baseline="middle"
      fill="#ffffff"
      filter="url(#soft-shadow)"
      font-family="Inter, SF Pro Display, Segoe UI, Arial, sans-serif"
      font-size="142"
      font-weight="800"
      letter-spacing="-12"
    >FlaxeoUI</text>
  </g>
</svg>
